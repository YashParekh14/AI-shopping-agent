# CI/CD Pipeline for AI Shopping Agent
#
# Triggers on every push and pull request to main.
# Pipeline:
#   1. Run unit tests (pytest) — no API key needed
#   2. If on main branch and tests pass → build Docker image
#   3. Push Docker image to Docker Hub
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   DOCKERHUB_USERNAME  — your Docker Hub username
#   DOCKERHUB_TOKEN     — Docker Hub access token (not password)

name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Job 1: Run unit tests ──────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --tb=short
        # Note: these tests use an isolated temp database
        # so no OPENAI_API_KEY or DATABASE_URL needed

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/

  # ── Job 2: Build and push Docker image ────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test                        # only runs if tests pass
    if: github.ref == 'refs/heads/main' # only on main branch, not PRs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-shopping-agent:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-shopping-agent:${{ github.sha }}

      - name: Image digest
        run: echo "Image pushed successfully"

deploy:
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: 13.42.21.134
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull yashparekh14/ai-shopping-agent:latest
            sudo docker stop shopping-agent || true
            sudo docker rm shopping-agent || true
            sudo docker run -d -p 8501:8501 \
              -e OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              -e LANGCHAIN_API_KEY="${{ secrets.LANGCHAIN_API_KEY }}" \
              -e LANGCHAIN_TRACING_V2="true" \
              -e LANGCHAIN_PROJECT="shopping-agent" \
              --name shopping-agent \
              --restart unless-stopped \
              yashparekh14/ai-shopping-agent:latest