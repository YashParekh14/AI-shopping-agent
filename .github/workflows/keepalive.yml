name: Supabase Keepalive

on:
  schedule:
    - cron: "0 6 */3 * *" # every 3 days at 06:00 UTC
  workflow_dispatch: # allows manual trigger from the Actions tab

jobs:
  ping-database:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent auto-pause
        run: |
          pip install psycopg2-binary
          python -c "
          import psycopg2
          conn = psycopg2.connect('${{ secrets.DATABASE_URL }}')
          cur = conn.cursor()
          cur.execute('SELECT 1;')
          print('Keepalive ping successful:', cur.fetchone())
          conn.close()
          "
